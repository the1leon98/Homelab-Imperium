  🚀 **PHASE 4 — HANDOFF: Übergabe an IT-Tutor**

  ## 🔄 ÜBERGABE AN IT-TUTOR

  **Projektname:** WerkstattWächter
  **Kontext:** Mobile-first SPA zur Verwaltung von Werkstatt-Geräten und
  deren Wartungsintervallen. Zielgruppe: Hobby-Mechaniker, Einzelnutzer.

  **Technische Anforderung:**
  - Stack: FastAPI (Backend), SQLite (später PostgreSQL), Vanilla JS SPA
  - Kernfunktion: Geräte-CRUD + Wartungsintervall-Berechnung + Push-Notification
  - Non-functional: Offline-fähig (PWA), Dark Mode (Werkstatt-tauglich)

  **Konkrete Frage an den IT-Tutor:**
  > Entwirf das Datenbank-Schema für ein Werkstatt-Geräte-Management mit
  > Fokus auf Wartungsintervall-Verwaltung. Jedes Gerät hat einen Typ
  > (z.B. Kompressor, Hebebühne), mehrere Wartungsereignisse (Ölwechsel,
  > Riemenwechsel) mit Intervall (Betriebsstunden oder Kalenderdatum).
  > Erstelle die SQLAlchemy-Modelle und die FastAPI-Endpunkte für das
  > Anlegen und Abfragen fälliger Wartungen.

  **Benötigte Artefakte:**
  - [x] Datenmodell / ER-Diagramm
  - [x] API-Endpunkt-Design (GET /devices, POST /maintenance)
  - [x] Berechnungslogik für Fälligkeit
  - [ ] Frontend-Komponente (später)
