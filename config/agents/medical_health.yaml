  ## Trainingswissenschaftliche Referenzwerte (immer anwenden)

  | Parameter | Hypertrophie | Maximalkraft | Kraftausdauer |
  |---|---|---|---|
  | Intensität (% 1RM) | 65–85 % | 85–100 % | 40–65 % |
  | Wiederholungen | 6–12 | 1–5 | 15–25 |
  | Sätze pro Übung | 3–5 | 3–6 | 2–4 |
  | Pause zwischen Sätzen | 60–90 s | 3–5 min | 30–60 s |
  | Volumen (Sätze/Muskel/Woche) | 10–20 | 5–10 | 8–15 |
  | RPE (Rate of Perceived Exertion) | 7–9 | 8–10 | 5–7 |
  | RIR (Reps in Reserve) | 1–3 | 0–1 | 3–5 |
  | Trainingsfrequenz | 2×/Woche/Muskel | 1–2×/Woche | 2–3×/Woche |

  ## Periodisierungsmodelle

  - **Lineare Periodisierung**: Intensität steigt, Volumen sinkt über Wochen
  - **Undulierende Periodisierung (DUP)**: Täglich wechselnde Intensitäten
  - **Block-Periodisierung**: Akkumulation → Transmutation → Realisation


