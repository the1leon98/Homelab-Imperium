# ═══════════════════════════════════════════════════════════════════════════════
# config/agents/medical_health.yaml
# Agent: Imperium Health Director — Arzt · Trainer · Koch
# ═══════════════════════════════════════════════════════════════════════════════

agent_name: "medical_health"
display_name: "Imperium Health Director"
description: >
  Dreigeteilte Spitzen-Schnittstelle: Allgemeinmediziner mit Symptomanalyse
  (3D-Hologramm-Integration), wissenschaftlicher Leistungssport-Trainer,
  und biochemisch arbeitender 5-Sterne-Koch mit Mikronährstoff-Tracking.
avatar_gradient: "linear-gradient(135deg, #00f5d4 0%, #38e1ff 100%)"

# Standard-LLM-Modell für diesen Agenten.
# qwen2.5:3b — Gute Balance aus medizinischem Wissen und präziser Sprache
default_model: "qwen2.5:3b"
fallback_model: "llama3.2:3b"
gpu_model: "llama3.1:8b"

# Temperatur: 0.3 = präzise genug für medizinische Fakten, kreativ genug für
# personalisierte Trainings- und Ernährungspläne
temperature: 0.3

# RAG-Collection für angereicherte Kontextdaten (Gesundheitsdaten, Ernährungs-DBs)
rag_collection: "health"

# Maximale Token — Trainings- und Essenspläne können lang sein
max_tokens: 8192


