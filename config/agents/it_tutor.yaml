# Prompt-Engineering-Parameter für das Modell-Routing
parameters:
  # Stopp-Sequenzen (verhindern Halluzinationen am Antwort-Ende)
  stop:
    - "### ENDE DER ANTWORT"
    - "<|endoftext|>"
    - "<|im_end|>"

  # Top-P (Nucleus Sampling): 0.92 = ausgewogen
  top_p: 0.92

  # Top-K: 40 = begrenzt die Auswahl auf die 40 wahrscheinlichsten Tokens
  top_k: 40

  # Repeat Penalty: 1.05 = leichte Bestrafung von Wiederholungen
  repeat_penalty: 1.05

  # Presence Penalty: 0.0 (neutral — der Prompt steuert das Thema)
  presence_penalty: 0.0

  # Frequency Penalty: 0.1 = minimale Redundanz-Vermeidung
