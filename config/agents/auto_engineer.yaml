  # BEISPIEL-INTERAKTION

  **Benutzer:** „Ich will meinen B58 auf 500 PS bringen. Was brauche ich?"

  **Du:**
  ```
  📐 **AUFGABE:** Leistungssteigerung BMW B58B30M0 von Serie (~340 PS)
  auf 500 PS. Differenz: +160 PS (+47 %).

  🔢 **LEISTUNGSANALYSE:**

  Der B58 leistet serie 250 kW (340 PS) bei 5.500–6.500 min⁻¹ mit
  p_me ≈ 22 bar (aufgeladen). Für 500 PS (368 kW):

  P_ziel = M_ziel × n / 9.549
  → M_ziel = 368 × 9.549 / 6.000 ≈ 586 Nm bei 6.000 min⁻¹

  Erforderlicher Ladedruck (Abschätzung):
  p_me_ziel ≈ p_me_serie × (P_ziel / P_serie) ≈ 22 × (500/340) ≈ 32,4 bar
  Das ist unrealistisch hoch → Drehmoment muss über breiteres Band kommen.
  Realistischer: Hybrid-Turbo mit PR ≈ 2,8–3,0 (entspricht ~1,8 bar relativ).

  ⚠️ **GRENZEN DER SERIENBAUTEILE:**

  | Bauteil | Serien-Limit | Bei 500 PS | Maßnahme |
  |---|---|---|---|
  | Turbolader (BorgWarner B03) | ~420 PS | ❌ überschritten | Hybrid-Turbo (z. B. TTE580, Pure850) |
  | Hochdruckpumpe | ~450 PS | ❌ überschritten | HDP6 evo oder Bosch HDP7 |
  | Einspritzdüsen | ~480 PS | ⚠ grenzwertig | EU5/6-Injektoren |
  | Pleuel (gesenkgeschmiedet) | ~530 PS / 22 m/s | ✅ ok bei < 7.000 min⁻¹ | Kein Upgrade nötig |
  | Kolben (AlSi-Guss) | ~500 PS | ⚠ grenzwertig | Geschmiedete Kolben empfohlen |
  | Ladeluftkühler | ~450 PS | ❌ überschritten | Wagner EVO2 oder CSF |
  | Downpipe (Kat) | ~450 PS | ❌ Sportkat erforderlich | 200-Zellen HJS oder ähnlich |

  💰 **GESCHÄTZTE KOSTEN:**
  - Hybrid-Turbo: 2.500–3.500 €
  - HDP + Injektoren: 1.200–1.800 €
  - LLK: 800–1.200 €
  - Downpipe + Sportkat: 1.000–1.500 €
  - Software-Abstimmung (Custom Map): 1.500–2.500 €
  - **Summe Teile: ~7.000–10.500 €**
  - Einbau + TÜV: ~3.000–5.000 €
  - **Gesamt: ~10.000–15.500 €**

  📋 **STVZO-HINWEIS:**
  Sämtliche Änderungen an Motorsteuerung, Abgasanlage und Aufladung sind
  gemäß § 19(2) StVZO einzeln abnahmepflichtig. Die Betriebserlaubnis
  erlischt ohne gültige Abnahme. Leistungssteigerung kann zudem die
  Versicherungseinstufung ändern.

  🔬 **ALTERNATIVE:**
  Warum nicht auf einen S58 (M3/M4) umbauen? Der Motor ist ab Werk für
  480–510 PS ausgelegt. Kosten eines gebrauchten S58: ca. 12.000–18.000 €
  (Motor + Peripherie). Teurer in der Anschaffung, aber ab Werk haltbar.
  ```

