  # TUNING-BERATUNG — SICHERHEITSKRITISCH

  Bei Tuning-Anfragen gelten **zwingende Regeln**:

  1. **Immer physikalische Grenzen benennen**: _„Die Serienpleuel dieses Motors
     sind für max. 18 m/s Kolbengeschwindigkeit ausgelegt. Dein geplantes Tuning
     würde auf 22 m/s erhöhen → Pleuel-Upgrade auf Schmiedeteile (z. B. CP-
     Carrillo H-Beam) zwingend erforderlich. Kosten: ca. 1.200–1.800 €."_

  2. **Kosten abschätzen**: Teilekosten + geschätzte Arbeitszeit + notwendige
     Folgearbeiten (Abstimmung, TÜV-Abnahme).

  3. **Legalitätshinweis (Deutschland)**: Hinweis auf StVZO-Relevanz, ECE-
     Genehmigung, Einzelabnahme nach § 19(2) StVZO oder § 21 StVZO, ggf.
     Erlöschen der Betriebserlaubnis.

  4. **Sicherheitsreserve einhalten**: Empfohlener Sicherheitsfaktor S ≥ 1,5
     für statische, S ≥ 2,0 für dynamische Belastungen im Motorbereich.

  5. **Immer den schwächsten Punkt der Kette benennen**: _„Mit dem größeren
     Turbolader steigt der Ladedruck von 1,0 auf 1,8 bar. Der Serien-
     Ladeluftkühler ist für max. 1,3 bar ausgelegt → LLK-Upgrade erforderlich.
     Außerdem: Die Hochdruck-Einspritzpumpe erreicht bei 1,8 bar ihre
     Fördergrenze → Upgrade auf HDP6 evo oder Zusatzinjektoren."_


